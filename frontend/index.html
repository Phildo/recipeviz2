<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Visualizer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        header {
            background: #16213e;
            padding: 1rem 2rem;
            border-bottom: 2px solid #0f3460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #e94560;
            font-size: 1.5rem;
        }

        nav button {
            background: #0f3460;
            color: #eee;
            border: none;
            padding: 0.5rem 1rem;
            margin-left: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        nav button:hover {
            background: #e94560;
        }

        nav button.active {
            background: #e94560;
        }

        main {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* Submit Form Styles */
        .submit-form {
            background: #16213e;
            border-radius: 8px;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .submit-form h2 {
            margin-bottom: 1.5rem;
            color: #e94560;
        }

        .tab-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tab-buttons button {
            flex: 1;
            padding: 0.75rem;
            background: #0f3460;
            border: none;
            color: #eee;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .tab-buttons button:hover,
        .tab-buttons button.active {
            background: #e94560;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        input[type="url"],
        textarea {
            width: 100%;
            padding: 0.75rem;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            color: #eee;
            border-radius: 4px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        textarea {
            min-height: 200px;
            resize: vertical;
        }

        .image-upload {
            border: 2px dashed #0f3460;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            margin-bottom: 1rem;
        }

        .image-upload:hover {
            border-color: #e94560;
        }

        .image-upload input {
            display: none;
        }

        .image-previews {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .image-preview {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #c73e54;
        }

        .submit-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        /* Recipe List Styles */
        .recipe-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .recipe-card {
            background: #16213e;
            border-radius: 8px;
            padding: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .recipe-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
        }

        .recipe-card h3 {
            color: #e94560;
            margin-bottom: 0.5rem;
        }

        .recipe-card .meta {
            color: #888;
            font-size: 0.85rem;
        }

        .recipe-card .description {
            margin-top: 0.75rem;
            color: #aaa;
            font-size: 0.9rem;
        }

        /* Recipe Visualization Styles */
        .recipe-view {
            position: relative;
        }

        .recipe-header {
            background: #16213e;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .recipe-header h2 {
            color: #e94560;
            margin-bottom: 0.5rem;
        }

        .recipe-header .meta {
            color: #888;
        }

        .back-btn {
            background: #0f3460;
            color: #eee;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .back-btn:hover {
            background: #e94560;
        }

        /* Flow Visualization */
        .graph-shell {
            position: relative;
            width: 100vw;
            margin-left: calc(50% - 50vw);
            padding: 1rem 1.5rem 2rem;
            --flow-port-size: 14px;
        }

        .steps-list {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .transform-step {
            position: relative;
            background: rgba(22, 33, 62, 0.94);
            border: 1px solid #28406e;
            border-left: 6px solid #e94560;
            border-radius: 10px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.24);
            margin: 0.5rem 0;
        }

        .transform-step.passive {
            border-left-color: #888;
            opacity: 0.9;
        }

        .step-ports {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 1rem;
            background: rgba(12, 18, 36, 0.72);
        }

        .step-ports.in {
            border-bottom: 1px dashed #2c3f67;
        }

        .step-ports.out {
            justify-content: flex-end;
            border-top: 1px dashed #2c3f67;
        }

        .step-port-group {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.4rem;
            min-height: 14px;
        }

        .step-port-group.right {
            margin-left: auto;
            justify-content: flex-end;
        }

        .flow-port {
            display: inline-block;
            width: var(--flow-port-size);
            height: var(--flow-port-size);
            color: var(--pipe-color, #9fb2d0);
            border: 2px solid currentColor;
            background: rgba(15, 22, 42, 0.92);
            border-radius: 50%;
        }

        .flow-port.right-lane {
            margin-right: calc((var(--lane-index, 1) - 1) * var(--flow-port-size));
        }

        .step-body {
            padding: 1rem 1.1rem;
        }

        .step-titleline {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.55rem;
        }

        .step-title {
            color: #ff718a;
            font-size: 1.05rem;
            font-weight: 700;
        }

        .step-submeta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            font-size: 0.78rem;
            color: #93a4c2;
        }

        .step-chip {
            background: rgba(15, 22, 42, 0.92);
            border: 1px solid #334973;
            border-radius: 999px;
            padding: 0.15rem 0.5rem;
        }

        .step-description {
            font-size: 0.84rem;
            color: #8b9ab8;
            font-style: italic;
            line-height: 1.35;
        }

        .ingredient-entry {
            width: fit-content;
            max-width: 100%;
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            align-self: flex-start;
            margin: 0.12rem 0;
        }

        .ingredient-entry.incoming {
            justify-content: flex-start;
            align-self: flex-start;
        }

        .ingredient-entry.incoming.derived {
            justify-content: flex-end;
            align-self: flex-end;
            margin-right: calc((var(--lane-index, 1) - 1) * var(--flow-port-size));
        }

        .ingredient-entry.outgoing {
            justify-content: flex-end;
            align-self: flex-end;
            margin-right: calc((var(--lane-index, 1) - 1) * var(--flow-port-size));
        }

        .ingredient-port {
            flex-shrink: 0;
        }

        .ingredient-entry-main {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border-radius: 999px;
            border: 1px solid rgba(159, 178, 208, 0.38);
            background: rgba(12, 18, 36, 0.92);
            padding: 0.2rem 0.65rem;
            font-size: 0.8rem;
            color: #d9e5ff;
            white-space: nowrap;
            max-width: 100%;
        }

        .ingredient-entry-main .ingredient-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--pipe-color, #9fb2d0);
            flex-shrink: 0;
        }

        .ingredient-entry-main .ingredient-amount {
            color: #ffd6de;
            font-weight: 600;
        }

        .ingredient-entry-main .ingredient-name {
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ingredient-entry-main .ingredient-tool {
            color: #93a4c2;
            font-size: 0.75rem;
        }

        /* SVG for connections */
        .flow-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .flow-link {
            fill: none;
            stroke-width: 3;
            stroke-linecap: round;
            opacity: 0.74;
        }

        .flow-link.base-input {
            stroke-dasharray: 5 5;
            opacity: 0.64;
        }

        .flow-link.terminal-output {
            stroke-dasharray: 3 7;
            opacity: 0.6;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #888;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error */
        .error {
            background: #5c1f1f;
            color: #ff6b6b;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #888;
        }

        .empty-state h3 {
            margin-bottom: 0.5rem;
            color: #aaa;
        }

        @media (max-width: 760px) {
            .graph-shell {
                padding: 0.75rem 0.75rem 1.5rem;
            }

            .ingredient-entry,
            .ingredient-entry.outgoing {
                align-self: flex-start;
            }

            .ingredient-entry-main {
                white-space: normal;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Recipe Visualizer</h1>
        <nav>
            <button id="nav-recipes" class="active">Recipes</button>
            <button id="nav-submit">Add Recipe</button>
        </nav>
    </header>

    <main>
        <!-- Recipe List View -->
        <div id="view-list" class="view active">
            <div id="recipe-list" class="recipe-list"></div>
            <div id="empty-state" class="empty-state" style="display: none;">
                <h3>No recipes yet</h3>
                <p>Add your first recipe to get started!</p>
            </div>
        </div>

        <!-- Submit Recipe View -->
        <div id="view-submit" class="view">
            <div class="submit-form">
                <h2>Add New Recipe</h2>

                <div class="tab-buttons">
                    <button class="tab-btn active" data-tab="url">From URL</button>
                    <button class="tab-btn" data-tab="text">From Text</button>
                    <button class="tab-btn" data-tab="images">From Images</button>
                </div>

                <div id="error-message" class="error" style="display: none;"></div>

                <form id="recipe-form">
                    <div id="tab-url" class="tab-content active">
                        <input type="url" id="input-url" placeholder="https://example.com/recipe">
                    </div>

                    <div id="tab-text" class="tab-content">
                        <textarea id="input-text" placeholder="Paste your recipe text here..."></textarea>
                    </div>

                    <div id="tab-images" class="tab-content">
                        <div class="image-upload" id="image-drop-zone">
                            <p>Drop images here or click to select</p>
                            <input type="file" id="input-images" accept="image/*" multiple>
                        </div>
                        <div id="image-previews" class="image-previews"></div>
                    </div>

                    <button type="submit" class="submit-btn" id="submit-btn">
                        Process Recipe
                    </button>
                </form>
            </div>
        </div>

        <!-- Recipe Detail View -->
        <div id="view-recipe" class="view">
            <button class="back-btn" id="back-btn">&larr; Back to Recipes</button>
            <div id="recipe-content"></div>
        </div>
    </main>

    <script>
        const API_BASE = '/api';

        // State
        let currentTab = 'url';
        let uploadedImages = [];
        let currentRecipeData = null;
        let flowDrawRaf = null;

        const PIPE_PALETTE = [
            '#ff6b6b', '#ffd166', '#06d6a0', '#4cc9f0', '#90be6d',
            '#f4a261', '#e9c46a', '#8ecae6', '#a0c4ff', '#ff99c8',
            '#80ed99', '#bdb2ff'
        ];

        // DOM Elements
        const views = {
            list: document.getElementById('view-list'),
            submit: document.getElementById('view-submit'),
            recipe: document.getElementById('view-recipe')
        };

        const navBtns = {
            recipes: document.getElementById('nav-recipes'),
            submit: document.getElementById('nav-submit')
        };

        // Navigation
        function showView(viewName) {
            Object.values(views).forEach(v => v.classList.remove('active'));
            views[viewName].classList.add('active');

            navBtns.recipes.classList.toggle('active', viewName === 'list');
            navBtns.submit.classList.toggle('active', viewName === 'submit');
        }

        navBtns.recipes.addEventListener('click', () => {
            showView('list');
            loadRecipes();
        });

        navBtns.submit.addEventListener('click', () => showView('submit'));

        document.getElementById('back-btn').addEventListener('click', () => {
            showView('list');
            loadRecipes();
        });

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                btn.classList.add('active');
                currentTab = btn.dataset.tab;
                document.getElementById(`tab-${currentTab}`).classList.add('active');
            });
        });

        // Image upload handling
        const dropZone = document.getElementById('image-drop-zone');
        const imageInput = document.getElementById('input-images');
        const previewsContainer = document.getElementById('image-previews');

        dropZone.addEventListener('click', () => imageInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#e94560';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#0f3460';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#0f3460';
            handleImages(e.dataTransfer.files);
        });

        imageInput.addEventListener('change', (e) => {
            handleImages(e.target.files);
        });

        function handleImages(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        uploadedImages.push(e.target.result);
                        renderImagePreviews();
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        function renderImagePreviews() {
            previewsContainer.innerHTML = uploadedImages.map((src, i) =>
                `<img src="${src}" class="image-preview" alt="Preview ${i + 1}">`
            ).join('');
        }

        // Form submission
        document.getElementById('recipe-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            const errorDiv = document.getElementById('error-message');

            errorDiv.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing... (this may take a minute)';

            let payload = { source_type: currentTab };

            if (currentTab === 'url') {
                payload.url = document.getElementById('input-url').value;
            } else if (currentTab === 'text') {
                payload.text = document.getElementById('input-text').value;
            } else if (currentTab === 'images') {
                payload.images = uploadedImages.map(img => img.split(',')[1]); // Remove data URL prefix
            }

            try {
                const response = await fetch(`${API_BASE}/recipes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to process recipe');
                }

                // Success - show the recipe
                showRecipe(data.recipe_id);

            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Process Recipe';
            }
        });

        // Load recipes list
        async function loadRecipes() {
            const listContainer = document.getElementById('recipe-list');
            const emptyState = document.getElementById('empty-state');

            listContainer.innerHTML = '<div class="loading"><div class="spinner"></div>Loading recipes...</div>';

            try {
                const response = await fetch(`${API_BASE}/recipes`);
                const data = await response.json();

                if (data.recipes.length === 0) {
                    listContainer.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }

                emptyState.style.display = 'none';
                listContainer.innerHTML = data.recipes.map(recipe => `
                    <div class="recipe-card" onclick="showRecipe(${recipe.id})">
                        <h3>${escapeHtml(recipe.name)}</h3>
                        <div class="meta">
                            ${recipe.servings ? `${recipe.servings} servings` : ''}
                            ${recipe.total_time_minutes ? ` &bull; ${recipe.total_time_minutes} min` : ''}
                            ${recipe.source_type ? ` &bull; From ${recipe.source_type}` : ''}
                        </div>
                        ${recipe.description ? `<div class="description">${escapeHtml(recipe.description)}</div>` : ''}
                    </div>
                `).join('');

            } catch (err) {
                listContainer.innerHTML = `<div class="error">Failed to load recipes: ${err.message}</div>`;
            }
        }

        // Show individual recipe
        async function showRecipe(recipeId) {
            const content = document.getElementById('recipe-content');
            content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading recipe...</div>';
            currentRecipeData = null;
            showView('recipe');

            try {
                const response = await fetch(`${API_BASE}/recipes/${recipeId}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to load recipe');
                }

                renderRecipe(data.recipe);

            } catch (err) {
                content.innerHTML = `<div class="error">Failed to load recipe: ${err.message}</div>`;
            }
        }

        // Render recipe visualization
        function renderRecipe(recipe) {
            const content = document.getElementById('recipe-content');
            const transforms = [...(recipe.transforms || [])]
                .sort((a, b) => (a.step_order ?? 0) - (b.step_order ?? 0));
            const firstProducerStepByPipe = new Map();
            const lastConsumerStepByPipe = new Map();

            transforms.forEach((transform, stepIdx) => {
                uniqueIoByPipe(transform.outputs || []).forEach(output => {
                    const pipeUid = normalizePipeUid(output.pipe_uid);
                    if (pipeUid !== null && !firstProducerStepByPipe.has(pipeUid)) {
                        firstProducerStepByPipe.set(pipeUid, stepIdx);
                    }
                });

                uniqueIoByPipe(transform.inputs || []).forEach(input => {
                    const pipeUid = normalizePipeUid(input.pipe_uid);
                    if (pipeUid === null) return;
                    const currentMax = lastConsumerStepByPipe.get(pipeUid);
                    if (currentMax === undefined || stepIdx > currentMax) {
                        lastConsumerStepByPipe.set(pipeUid, stepIdx);
                    }
                });
            });

            const pipeLaneByUid = new Map();
            const freeLanes = [];
            let maxLaneAssigned = 0;

            function claimLane(pipeUid) {
                if (pipeLaneByUid.has(pipeUid)) {
                    return pipeLaneByUid.get(pipeUid);
                }

                let lane;
                if (freeLanes.length > 0) {
                    freeLanes.sort((a, b) => a - b);
                    lane = freeLanes.pop();
                } else {
                    maxLaneAssigned += 1;
                    lane = maxLaneAssigned;
                }

                pipeLaneByUid.set(pipeUid, lane);
                return lane;
            }

            function releaseLane(pipeUid) {
                if (!pipeLaneByUid.has(pipeUid)) return;
                const lane = pipeLaneByUid.get(pipeUid);
                pipeLaneByUid.delete(pipeUid);
                if (!freeLanes.includes(lane)) {
                    freeLanes.push(lane);
                }
            }

            let html = `
                <div class="recipe-header">
                    <h2>${escapeHtml(recipe.name)}</h2>
                    <div class="meta">
                        ${recipe.servings ? `${recipe.servings} servings` : ''}
                        ${recipe.total_time_minutes ? ` &bull; ${recipe.total_time_minutes} min total` : ''}
                    </div>
                    ${recipe.description ? `<p style="margin-top: 0.5rem; color: #aaa;">${escapeHtml(recipe.description)}</p>` : ''}
                </div>
            `;

            html += '<div class="graph-shell"><svg class="flow-svg" aria-hidden="true"></svg><div class="steps-list">';

            transforms.forEach((transform, index) => {
                const isPassive = !transform.active;
                const inputs = uniqueIoByPipe(transform.inputs || []);
                const outputs = uniqueIoByPipe(transform.outputs || []);
                const stepNumber = index + 1;
                const previousStep = index > 0 ? transforms[index - 1] : null;
                const prevOutputPipes = previousStep
                    ? pipeSetFromIo(previousStep.outputs || [])
                    : new Set();

                const inputInfos = inputs.map(input => {
                    const pipeUid = normalizePipeUid(input.pipe_uid);
                    const producerStepIdx = pipeUid === null ? undefined : firstProducerStepByPipe.get(pipeUid);
                    const isDerivedInput = producerStepIdx !== undefined && producerStepIdx < index;
                    const laneIndex = isDerivedInput && pipeUid !== null
                        ? claimLane(pipeUid)
                        : 1;

                    return {
                        io: input,
                        pipeUid,
                        isDerivedInput,
                        laneIndex
                    };
                });

                const listInputInfos = inputInfos.filter(info => !(info.pipeUid && prevOutputPipes.has(info.pipeUid)));
                const baseInputInfos = inputInfos.filter(info => !info.isDerivedInput);
                const derivedInputInfos = inputInfos.filter(info => info.isDerivedInput);

                if (listInputInfos.length > 0) {
                    listInputInfos.forEach(info => {
                        html += renderIngredientEntry(
                            info.io,
                            transform.id,
                            info.isDerivedInput ? 'in-derived' : 'in',
                            stepNumber,
                            info.laneIndex
                        );
                    });
                }

                const releasableInputPipes = derivedInputInfos
                    .filter(info => info.pipeUid && lastConsumerStepByPipe.get(info.pipeUid) === index)
                    .map(info => info.pipeUid);
                releasableInputPipes.forEach(pipeUid => releaseLane(pipeUid));

                const outputInfos = outputs.map(output => {
                    const pipeUid = normalizePipeUid(output.pipe_uid);
                    const laneIndex = pipeUid !== null
                        ? claimLane(pipeUid)
                        : 1;
                    return { io: output, pipeUid, laneIndex };
                });

                html += `
                    <section class="transform-step ${isPassive ? 'passive' : ''}" data-transform-id="${escapeHtml(String(transform.id))}">
                        <div class="step-ports in">
                            ${inputs.length > 0
                                ? `
                                    <div class="step-port-group left">
                                        ${baseInputInfos.map(info => renderFlowPort(info.io, transform.id, 'in', 'transform', info.laneIndex, 'none')).join('')}
                                    </div>
                                    <div class="step-port-group right">
                                        ${derivedInputInfos.map(info => renderFlowPort(info.io, transform.id, 'in', 'transform', info.laneIndex, 'right')).join('')}
                                    </div>
                                `
                                : '<span class="step-chip">No incoming flow</span>'}
                        </div>
                        <div class="step-body">
                            <div class="step-titleline">
                                <span class="step-title">${stepNumber}. ${escapeHtml(transform.name || 'Unnamed step')}</span>
                                <div class="step-submeta">
                                    <span class="step-chip">${escapeHtml(transform.action_name || 'process')}</span>
                                    ${transform.duration_minutes ? `<span class="step-chip">${transform.duration_minutes} min</span>` : ''}
                                </div>
                            </div>
                            ${transform.description ? `<div class="step-description">${escapeHtml(transform.description)}</div>` : ''}
                        </div>
                        <div class="step-ports out">
                            ${outputInfos.length > 0
                                ? `
                                    <div class="step-port-group right">
                                        ${outputInfos.map(info => renderFlowPort(info.io, transform.id, 'out', 'transform', info.laneIndex, 'right')).join('')}
                                    </div>
                                `
                                : '<span class="step-chip">No outgoing flow</span>'}
                        </div>
                    </section>
                `;

                if (outputInfos.length > 0) {
                    outputInfos.forEach(info => {
                        html += renderIngredientEntry(info.io, transform.id, 'out', stepNumber, info.laneIndex);
                    });
                }
            });

            html += '</div></div>';

            content.innerHTML = html;
            currentRecipeData = { ...recipe, transforms };
            scheduleFlowDraw();
        }

        function renderFlowPort(io, transformId, direction, role, laneIndex = 1, laneSide = 'none') {
            const pipeUid = normalizePipeUid(io.pipe_uid);
            const color = getPipeColor(pipeUid, io.color);
            const label = formatIoLabel(io, true);
            const laneClass = laneSide === 'right'
                ? ' right-lane'
                : laneSide === 'left'
                    ? ' left-lane'
                    : '';

            return `
                <span
                    class="flow-port${laneClass}"
                    data-transform-id="${escapeHtml(String(transformId))}"
                    data-pipe-uid="${pipeUid === null ? '' : escapeHtml(pipeUid)}"
                    data-dir="${direction}"
                    data-port-role="${role}"
                    title="${escapeHtml(label)}"
                    style="--pipe-color: ${color}; --lane-index: ${laneIndex};"
                ></span>
            `;
        }

        function renderIngredientEntry(io, transformId, direction, stepNumber, laneIndex = 1) {
            const pipeUid = normalizePipeUid(io.pipe_uid);
            const color = getPipeColor(pipeUid, io.color);
            const amount = formatAmount(io);
            const name = formatName(io);
            const isTool = io.tool_name && !io.ingredient_name;
            const isInput = direction !== 'out';
            const portDir = isInput ? 'in' : 'out';
            const label = isInput
                ? `Step ${stepNumber} input`
                : `Step ${stepNumber} output`;
            const port = renderFlowPort(io, transformId, portDir, 'ingredient', laneIndex, 'none');
            const ingredientBody = `
                <div class="ingredient-entry-main" style="--pipe-color: ${color};">
                    <span class="ingredient-dot"></span>
                    ${amount ? `<span class="ingredient-amount">${escapeHtml(amount)}</span>` : ''}
                    <span class="ingredient-name">${escapeHtml(name)}</span>
                    ${isTool ? '<span class="ingredient-tool">(tool)</span>' : ''}
                </div>
            `;
            const content = direction === 'in' ? `${port}${ingredientBody}` : `${ingredientBody}${port}`;

            return `
                <section
                    class="ingredient-entry ${isInput ? 'incoming' : 'outgoing'}${direction === 'in-derived' ? ' derived' : ''}"
                    title="${escapeHtml(label)}"
                    style="--lane-index: ${laneIndex};"
                >
                    ${content}
                </section>
            `;
        }

        function scheduleFlowDraw() {
            if (flowDrawRaf) {
                cancelAnimationFrame(flowDrawRaf);
            }
            flowDrawRaf = requestAnimationFrame(drawRecipeFlows);
        }

        function drawRecipeFlows() {
            flowDrawRaf = null;
            if (!currentRecipeData) return;

            const graphShell = document.querySelector('#recipe-content .graph-shell');
            if (!graphShell) return;

            const svg = graphShell.querySelector('.flow-svg');
            if (!svg) return;

            const width = Math.max(1, Math.round(graphShell.clientWidth));
            const height = Math.max(1, Math.round(graphShell.scrollHeight));
            const leftX = 24;
            const rightX = width - 24;

            svg.innerHTML = '';
            svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            svg.setAttribute('width', String(width));
            svg.setAttribute('height', String(height));

            const shellRect = graphShell.getBoundingClientRect();
            const transformInPorts = new Map();
            const transformOutPorts = new Map();
            const ingredientInPorts = new Map();
            const ingredientOutPorts = new Map();

            graphShell.querySelectorAll('.flow-port[data-pipe-uid]').forEach(port => {
                const pipeUid = port.dataset.pipeUid || '';
                const transformId = port.dataset.transformId || '';
                const dir = port.dataset.dir || '';
                const role = port.dataset.portRole || 'transform';
                if (!pipeUid || !transformId) return;

                const rect = port.getBoundingClientRect();
                const point = {
                    x: rect.left - shellRect.left + (rect.width / 2),
                    y: rect.top - shellRect.top + (rect.height / 2)
                };
                const key = `${transformId}|${pipeUid}`;

                if (role === 'ingredient' && dir === 'in') {
                    ingredientInPorts.set(key, point);
                } else if (role === 'ingredient' && dir === 'out') {
                    ingredientOutPorts.set(key, point);
                } else if (dir === 'in') {
                    transformInPorts.set(key, point);
                } else if (dir === 'out') {
                    transformOutPorts.set(key, point);
                }
            });

            const transforms = [...(currentRecipeData.transforms || [])]
                .sort((a, b) => (a.step_order ?? 0) - (b.step_order ?? 0));
            const transformRank = new Map();
            transforms.forEach((transform, index) => transformRank.set(String(transform.id), index));

            const producersByPipe = new Map();
            const consumersByPipe = new Map();
            const metaByPipe = new Map();
            const allPipes = new Set();

            transforms.forEach(transform => {
                const transformId = String(transform.id);
                const transformInputs = uniqueIoByPipe(transform.inputs || []);
                const transformOutputs = uniqueIoByPipe(transform.outputs || []);

                transformInputs.forEach(input => {
                    const pipeUid = normalizePipeUid(input.pipe_uid);
                    if (pipeUid === null) return;
                    const key = `${transformId}|${pipeUid}`;
                    const start = ingredientInPorts.get(key);
                    const end = transformInPorts.get(key);
                    if (!start || !end) return;
                    appendPath(svg, buildCurvePath(start, end), getPipeColor(pipeUid, input.color), 'flow-link');
                });

                transformOutputs.forEach(output => {
                    const pipeUid = normalizePipeUid(output.pipe_uid);
                    if (pipeUid === null) return;
                    const key = `${transformId}|${pipeUid}`;
                    const start = transformOutPorts.get(key);
                    const end = ingredientOutPorts.get(key);
                    if (!start || !end) return;
                    appendPath(svg, buildCurvePath(start, end), getPipeColor(pipeUid, output.color), 'flow-link');
                });

                transformOutputs.forEach(output => {
                    const pipeUid = normalizePipeUid(output.pipe_uid);
                    if (pipeUid === null) return;
                    allPipes.add(pipeUid);
                    if (!metaByPipe.has(pipeUid)) metaByPipe.set(pipeUid, output);
                    if (!producersByPipe.has(pipeUid)) producersByPipe.set(pipeUid, transformId);
                });

                transformInputs.forEach(input => {
                    const pipeUid = normalizePipeUid(input.pipe_uid);
                    if (pipeUid === null) return;
                    allPipes.add(pipeUid);
                    if (!metaByPipe.has(pipeUid)) metaByPipe.set(pipeUid, input);
                    if (!consumersByPipe.has(pipeUid)) consumersByPipe.set(pipeUid, []);
                    consumersByPipe.get(pipeUid).push(transformId);
                });
            });

            allPipes.forEach(pipeUid => {
                const producerId = producersByPipe.get(pipeUid) || null;
                const consumers = (consumersByPipe.get(pipeUid) || [])
                    .sort((a, b) => (transformRank.get(a) ?? 0) - (transformRank.get(b) ?? 0));
                const meta = metaByPipe.get(pipeUid) || {};
                const color = getPipeColor(pipeUid, meta.color);

                if (producerId && consumers.length > 0) {
                    consumers.forEach(consumerId => {
                        const start = ingredientOutPorts.get(`${producerId}|${pipeUid}`)
                            || transformOutPorts.get(`${producerId}|${pipeUid}`);
                        const end = ingredientInPorts.get(`${consumerId}|${pipeUid}`)
                            || transformInPorts.get(`${consumerId}|${pipeUid}`);
                        if (!start || !end) return;

                        appendPath(svg, buildCurvePath(start, end), color, 'flow-link');
                    });
                    return;
                }

                if (!producerId && consumers.length > 0) {
                    consumers.forEach(consumerId => {
                        const end = ingredientInPorts.get(`${consumerId}|${pipeUid}`)
                            || transformInPorts.get(`${consumerId}|${pipeUid}`);
                        if (!end) return;
                        const start = { x: leftX, y: end.y - 20 };

                        appendPath(svg, buildCurvePath(start, end), color, 'flow-link base-input');
                    });
                    return;
                }

                if (producerId && consumers.length === 0) {
                    const start = ingredientOutPorts.get(`${producerId}|${pipeUid}`)
                        || transformOutPorts.get(`${producerId}|${pipeUid}`);
                    if (!start) return;
                    const end = { x: rightX, y: start.y + 20 };
                    appendPath(svg, buildCurvePath(start, end), color, 'flow-link terminal-output');
                }
            });
        }

        function appendPath(svg, d, color, className) {
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', d);
            path.setAttribute('stroke', color);
            path.setAttribute('class', className);
            svg.appendChild(path);
            return path;
        }

        function buildCurvePath(start, end) {
            const deltaY = end.y - start.y;
            const bend = Math.max(34, Math.abs(deltaY) * 0.42);
            const dir = deltaY >= 0 ? 1 : -1;
            const c1y = start.y + (bend * dir);
            const c2y = end.y - (bend * dir);
            return `M ${start.x.toFixed(2)} ${start.y.toFixed(2)} C ${start.x.toFixed(2)} ${c1y.toFixed(2)}, ${end.x.toFixed(2)} ${c2y.toFixed(2)}, ${end.x.toFixed(2)} ${end.y.toFixed(2)}`;
        }

        function uniqueIoByPipe(items) {
            const seen = new Set();
            const result = [];
            items.forEach((item, index) => {
                const pipeUid = normalizePipeUid(item.pipe_uid);
                const key = pipeUid === null
                    ? `missing:${index}:${formatName(item)}`
                    : `pipe:${pipeUid}`;
                if (seen.has(key)) return;
                seen.add(key);
                result.push(item);
            });
            return result;
        }

        function pipeSetFromIo(items) {
            const set = new Set();
            uniqueIoByPipe(items || []).forEach(item => {
                const pipeUid = normalizePipeUid(item.pipe_uid);
                if (pipeUid !== null) set.add(pipeUid);
            });
            return set;
        }

        function normalizePipeUid(pipeUid) {
            if (pipeUid === null || pipeUid === undefined) return null;
            const str = String(pipeUid).trim();
            return str.length > 0 ? str : null;
        }

        function formatAmount(io) {
            if (io.amount === null || io.amount === undefined || io.amount === '') return '';
            return `${io.amount}${io.unit_name ? ` ${io.unit_name}` : ''}`;
        }

        function formatName(io) {
            return io.display_name || io.ingredient_name || io.tool_name || 'Unnamed flow';
        }

        function formatIoLabel(io, includeToolTag) {
            const amount = formatAmount(io);
            const name = formatName(io);
            let label = amount ? `${amount} ${name}` : name;
            if (includeToolTag && io.tool_name && !io.ingredient_name) {
                label += ' (tool)';
            }
            return label;
        }

        function getPipeColor(pipeUid, explicitColor) {
            if (explicitColor) return explicitColor;
            if (pipeUid === null) return '#9fb2d0';
            let hash = 0;
            for (let i = 0; i < pipeUid.length; i += 1) {
                hash = ((hash << 5) - hash) + pipeUid.charCodeAt(i);
                hash |= 0;
            }
            const idx = Math.abs(hash) % PIPE_PALETTE.length;
            return PIPE_PALETTE[idx];
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        window.addEventListener('resize', () => {
            if (!currentRecipeData || !views.recipe.classList.contains('active')) return;
            scheduleFlowDraw();
        });

        // Initial load
        loadRecipes();
    </script>
</body>
</html>
